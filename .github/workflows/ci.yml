# CI/CD Workflow 参考模板 — clickhousex (ClickHouse OLAP L2 Adapter)
#
# 将此文件复制到 github.com/ZoneCNH/clickhousex/.github/workflows/ci.yml
# 并根据实际 ClickHouse 连接配置调整。
#
# 当前状态: EXT_CI=❌ (待部署) | SOAK=❌ (需 GitHub release + integration evidence)
# 模板来源: ZoneCNH/ZoneCNH module/clickhousex/ci-workflow.yaml (Trust Alignment 2026-06-14)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
      - name: Unit Test
        run: go test ./... -race -count=1 -short
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6

  # 使用 Docker ClickHouse 进行集成测试
  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Integration Test
        env:
          CLICKHOUSE_DSN: "clickhouse://default:@localhost:9000/test"
        run: go test ./... -run Integration -count=1 -v

  trust-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.0.0
      - name: Trust Alignment
        run: |
          GOWORK=off xlibgate trust identity --repo .
          GOWORK=off xlibgate trust template-residue --repo .
          GOWORK=off xlibgate trust release-consistency --offline --repo .
          GOWORK=off xlibgate trust secret-redaction --repo . --path release/evidence

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
