name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, clickhousex]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4.2.2
      - uses: actions/setup-go@v5 # v5.3.0
        with:
          go-version: "1.25.0"
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test ./...
      - name: Race tests
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Coverage
        run: make test-coverage
      - name: Dependency boundary
        run: |
          go list -deps ./... > deps.txt
          if grep -E '(^|/)configx($|/)' deps.txt; then
            echo "configx dependency is not allowed"
            exit 1
          fi
      - name: Production release gate
        run: make release-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Wait for ClickHouse
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8123/ping >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "ClickHouse did not become ready"
          exit 1
      - name: Integration Test
        env:
          CLICKHOUSEX_RUN_INTEGRATION: "1"
          CLICKHOUSEX_TEST_DSN: "clickhouse://default:@localhost:9000/test"
        run: GOWORK=off go test -count=1 -run TestClickHouseLiveIntegration -v ./pkg/clickhousex

  trust-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.1.0
      - name: Trust Alignment
        run: |
          GOWORK=off xlibgate trust identity --repo .
          GOWORK=off xlibgate trust template-residue --repo .
          GOWORK=off xlibgate trust secret-redaction --repo . --path release/evidence
      - name: Release metadata consistency
        run: |
          expected="$(cat VERSION)"
          grep -q "table_version: ${expected}" .repo-contract.yaml
          grep -q "latest_git_tag: ${expected}" .repo-contract.yaml
          grep -q "Version[[:space:]]*=[[:space:]]*\"${expected}\"" pkg/clickhousex/version.go
          grep -q "^## ${expected}" CHANGELOG.md
          grep -q "\"version\": \"${expected}\"" release/manifest/latest.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-check:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, lint, integration, trust-alignment, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Release consistency
        run: |
          grep -R "Version[[:space:]]*=[[:space:]]*\"${GITHUB_REF_NAME}\"" pkg/clickhousex/version.go
          make release-check
