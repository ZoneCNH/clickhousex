name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, clickhousex]
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
      - name: Build
        run: go build ./...
      - name: Unit tests
        run: go test ./...
      - name: Race tests
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Coverage
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt
          awk '/^total:/ { if ($3 != "100.0%") { print "coverage " $3 " is below required 100.0%"; exit 1 } }' coverage.txt
      - name: Dependency boundary
        run: |
          go list -deps ./... > deps.txt
          if grep -E '(^|/)configx($|/)' deps.txt; then
            echo "configx dependency is not allowed"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Lint
        uses: golangci/golangci-lint-action@v6

  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: test
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Integration Test
        env:
          CLICKHOUSE_DSN: "clickhouse://default:@localhost:9000/test"
        run: go test ./... -tags=integration -run Integration -count=1 -v

  trust-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@555ee7b841b52e6e11d7493fb31916e80c28d7f3
      - name: Trust Alignment
        run: |
          GOWORK=off xlibgate trust identity --repo .
          GOWORK=off xlibgate trust template-residue --repo .
          GOWORK=off xlibgate trust secret-redaction --repo . --path release/evidence
      - name: Release metadata consistency
        run: |
          expected="$(cat VERSION)"
          grep -q "table_version: ${expected}" .repo-contract.yaml
          grep -q "latest_git_tag: ${expected}" .repo-contract.yaml
          grep -q "Version[[:space:]]*=[[:space:]]*\"${expected}\"" pkg/clickhousex/version.go
          grep -q "^## ${expected}" CHANGELOG.md
          grep -q "\"version\": \"${expected}\"" release/manifest/latest.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  release-check:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [quality, lint, integration, trust-alignment, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: "1.23"
      - name: Release consistency
        run: |
          grep -R "Version[[:space:]]*=[[:space:]]*\"${GITHUB_REF_NAME}\"" pkg/clickhousex/version.go
          go test ./...
