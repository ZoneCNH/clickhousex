name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Go verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify no configx dependency
        run: |
          if go list -deps ./... | grep -q 'configx'; then
            echo "configx dependency is not allowed" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...
      - name: Coverage
        run: |
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tee coverage.txt
          awk '/^total:/ { if ($3 != "100.0%") { print "coverage " $3 " is below required 100.0%"; exit 1 } }' coverage.txt
      - name: Dependency boundary
        run: |
          go list -deps ./... > deps.txt
          if grep -E '(^|/)configx($|/)' deps.txt; then
            echo "configx dependency is not allowed"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Coverage
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          test "$total" = "100.0%"
